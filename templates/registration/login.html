{% extends 'events/base.html' %}{% block content %}<div class="row justify-content-center"><div class="col-md-6"><h1>Log in</h1><form method="post" class="card card-body">{% csrf_token %}{% for field in form %}<div class="mb-3"><label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>{{ field }}{{ field.errors }}</div>{% endfor %}<input type="hidden" name="next" value="{{ next }}"><button class="btn btn-primary">Log in</button><a class="small mt-3" href="{% url 'events:password_reset' %}">Forgot your password?</a></form></div></div>{% endblock %}
