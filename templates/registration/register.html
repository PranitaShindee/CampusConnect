{% extends 'events/base.html' %}{% block content %}<div class="row justify-content-center"><div class="col-md-8"><h1>Create your account</h1><form method="post" class="card card-body">{% csrf_token %}{% for field in form %}<div class="mb-3"><label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>{{ field }}{% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}{% if field.help_text %}<div class="form-text">{{ field.help_text }}</div>{% endif %}</div>{% endfor %}<button class="btn btn-primary">Register</button></form></div></div>{% endblock %}
