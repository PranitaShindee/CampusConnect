{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}CampusConnect{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'events/css/styles.css' %}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark campus-navbar">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="{% url 'events:home' %}">CampusConnect</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" href="{% url 'events:home' %}">Home</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="flex-grow-1">
    <div class="container py-5">
        {% block content %}{% endblock %}
    </div>
</main>

<footer class="campus-footer py-4 mt-auto">
    <div class="container text-center text-md-start">
        <p class="mb-0">CampusConnect is a campus event board built for COMP-8347 at the University of Windsor.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'events/js/main.js' %}"></script>
</body>
</html>
