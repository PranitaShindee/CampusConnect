{% extends 'events/base.html' %}{% block content %}<h1>Contact us</h1><p>Send feedback or a question. During development, messages are written to the server console.</p><form method="post" class="card card-body">{% csrf_token %}{% for field in form %}<div class="mb-3"><label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>{{ field }}{% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}</div>{% endfor %}<button class="btn btn-primary">Send message</button></form>{% endblock %}
