{% extends 'events/base.html' %}{% block content %}<h1>Saved events</h1><div class="row g-3">{% for event in favorites %}<div class="col-md-6"><div class="card card-body"><h2 class="h5"><a href="{{ event.get_absolute_url }}">{{ event.title }}</a></h2><p class="mb-0">{{ event.start_datetime|date:'M j, Y' }}</p></div></div>{% empty %}<p>You have not saved any events yet.</p>{% endfor %}</div>{% endblock %}
